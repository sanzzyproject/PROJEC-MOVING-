<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANN404 Movies</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 id="header-title">Rekomendasi</h1>
            <div class="profile-pic"></div>
        </header>

        <main class="app-content">
            
            <section id="home-view" class="view-section active">
                <div class="movie-grid" id="home-movies">
                    <div class="loader">Loading...</div>
                </div>
                <div class="credit">Developed by SANN404 FORUM</div>
            </section>

            <section id="search-view" class="view-section">
                <div class="search-bar-container">
                    <input type="text" id="search-input" placeholder="Cari film favoritmu...">
                    <button id="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div class="movie-grid" id="search-movies">
                    </div>
            </section>
        </main>

        <div id="detail-modal" class="modal">
            <div class="modal-content">
                <button id="close-modal" class="close-btn"><i class="fas fa-arrow-left"></i></button>
                <img id="detail-img" src="" alt="Poster">
                <div class="detail-body">
                    <h2 id="detail-title">Judul</h2>
                    <div class="badges" id="detail-badges"></div>
                    <p id="detail-synopsis" class="synopsis"></p>
                    <div class="downloads-section">
                        <h3>Link Download</h3>
                        <div id="detail-downloads"></div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" data-target="home-view" data-title="Rekomendasi">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" data-target="search-view" data-title="Pencarian">
                <i class="fas fa-search"></i>
                <span>Search</span>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
